services:
  postgres:
    image: 'pgvector/pgvector:pg16'
    environment:
      - 'POSTGRES_DB=clio'
      - 'POSTGRES_PASSWORD=clio'
      - 'POSTGRES_USER=clio'
    ports:
      - '5432:5432'
    volumes:
      - 'clio-postgres:/var/lib/postgresql/data'
      - './db/init:/docker-entrypoint-initdb.d:ro'

volumes:
  clio-postgres:
