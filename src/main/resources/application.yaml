spring:
  application:
    name: clio
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clio}
    username: ${SPRING_DATASOURCE_USERNAME:clio}
    password: ${SPRING_DATASOURCE_PASSWORD:clio}
  jpa:
    hibernate:
      ddl-auto: ${CLIO_DDL_AUTO:update}
    open-in-view: false
