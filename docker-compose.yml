services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clio
      POSTGRES_USER: clio
      POSTGRES_PASSWORD: clio
    ports:
      - "5432:5432"
    volumes:
      - clio-postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  app:
    build: .
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clio
      SPRING_DATASOURCE_USERNAME: clio
      SPRING_DATASOURCE_PASSWORD: clio
      CLIO_WORKSPACE_ROOT: /workspace
    ports:
      - "8080:8080"
    volumes:
      - ${CLIO_WORKSPACE:-/Users/taek/Documents/Spring}:/workspace:ro

volumes:
  clio-postgres:
